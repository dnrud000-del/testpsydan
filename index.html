<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>심리치료 전공 용어 TEST</title>
    <!-- 모바일 앱처럼 보이기 위한 메타 태그 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #f1f5f9;
            -webkit-tap-highlight-color: transparent;
        }
        .card { transition: all 0.3s ease; }
        .speaker-btn:active { transform: scale(0.9); }
        /* 모바일에서 입력창 포커스 시 줌 방지 */
        input[type="text"] { font-size: 16px !important; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="max-w-md w-full bg-white rounded-[2.5rem] shadow-2xl p-8 card border border-slate-100">
        <!-- 메인 화면 -->
        <div id="home-screen">
            <div class="text-6xl text-center mb-6">🎓</div>
            <h1 class="text-2xl font-bold text-center text-slate-800 mb-2">심리치료 전공 용어</h1>
            <p class="text-center text-slate-500 mb-10 font-medium">단어 암기 프로그램</p>
            
            <div class="space-y-4">
                <button onclick="startStudy('kor')" class="w-full py-5 bg-indigo-600 text-white rounded-2xl font-bold text-lg shadow-lg shadow-indigo-100 hover:bg-indigo-700 active:scale-[0.98] transition-all">
                    한글 뜻 쓰기
                </button>
                <button onclick="startStudy('eng')" class="w-full py-5 bg-white text-emerald-600 border-2 border-emerald-600 rounded-2xl font-bold text-lg hover:bg-emerald-50 active:scale-[0.98] transition-all">
                    영어 단어 쓰기
                </button>
            </div>
            <div class="mt-12 p-4 bg-slate-50 rounded-2xl">
                <p class="text-center text-xs text-slate-400 leading-relaxed">
                    단국대학교 심리치료학과 전공 용어 35선<br>
                    스피커 아이콘을 누르면 발음을 들을 수 있습니다.
                </p>
            </div>
        </div>

        <!-- 학습 화면 -->
        <div id="study-screen" class="hidden">
            <div class="flex justify-between items-center mb-8">
                <button onclick="goHome()" class="flex items-center text-slate-400 hover:text-slate-600 font-semibold text-sm">
                    <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    그만하기
                </button>
                <div class="flex flex-col items-end">
                    <span id="progress-text" class="text-[10px] font-bold text-indigo-500 uppercase tracking-wider mb-1">PROGRESS</span>
                    <div class="w-24 h-2 bg-slate-100 rounded-full overflow-hidden">
                        <div id="progress-bar" class="h-full bg-indigo-500 transition-all duration-500" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div class="text-center mb-10">
                <p id="question-label" class="text-xs font-bold text-slate-400 mb-3 tracking-widest uppercase">TRANSLATE THIS</p>
                <div class="flex items-center justify-center gap-3">
                    <h2 id="question-text" class="text-3xl font-extrabold text-slate-800 break-keep leading-tight">Question</h2>
                    <button id="speaker-icon" onclick="speakCurrentWord()" class="speaker-btn p-3 bg-indigo-50 text-indigo-600 rounded-full hover:bg-indigo-100 transition-colors hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                    </button>
                </div>
            </div>

            <div class="space-y-4">
                <input type="text" id="answer-input" placeholder="여기에 입력하세요" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
                    class="w-full px-6 py-4 rounded-2xl border-2 border-slate-100 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-50 font-medium text-center text-xl transition-all outline-none bg-slate-50 focus:bg-white">
                
                <div class="grid grid-cols-2 gap-4">
                    <button id="idk-btn" onclick="handleIDontKnow()" class="py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold hover:bg-slate-200 active:scale-95 transition-all">
                        모르겠어요
                    </button>
                    <button id="submit-btn" onclick="checkAnswer()" class="py-4 bg-slate-800 text-white rounded-2xl font-bold hover:bg-slate-900 active:scale-95 transition-all shadow-lg shadow-slate-200">
                        확인
                    </button>
                </div>
            </div>

            <!-- 피드백 메시지 영역 -->
            <div id="feedback-area" class="mt-8 hidden text-center p-6 rounded-[2rem] animate-in fade-in zoom-in duration-300">
                <p id="feedback-msg" class="text-lg font-bold mb-2"></p>
                <div class="flex items-center justify-center gap-2">
                    <p id="correct-answer-display" class="font-medium opacity-90"></p>
                    <button id="feedback-speaker" onclick="speakFeedbackWord()" class="p-2 bg-white/50 rounded-full hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
                    </button>
                </div>
                <button id="next-btn" class="mt-4 px-6 py-2 bg-white/30 rounded-full text-sm font-bold border border-white/50 hover:bg-white/50 transition-colors">터치해서 계속하기</button>
            </div>
        </div>

        <!-- 완료 화면 -->
        <div id="complete-screen" class="hidden text-center py-10">
            <div class="mb-8 relative inline-block">
                <span class="text-7xl">🏆</span>
                <div class="absolute -top-2 -right-2 w-6 h-6 bg-yellow-400 rounded-full animate-ping"></div>
            </div>
            <h2 class="text-3xl font-black text-slate-800 mb-3">완벽합니다!</h2>
            <p class="text-slate-500 mb-10 leading-relaxed font-medium">35개의 전공 용어를<br>모두 마스터하셨습니다.</p>
            <button onclick="goHome()" class="w-full py-5 bg-indigo-600 text-white rounded-2xl font-bold text-lg shadow-xl shadow-indigo-100 active:scale-95 transition-all">
                다시 시작하기
            </button>
        </div>
    </div>

    <script>
        const wordData = [
            { eng: "Anger Management", kor: "분노 조절 기술" },
            { eng: "Antecedent-Based Intervention", kor: "선행사건 중심 중재" },
            { eng: "Augmentative & Alternative Communication", kor: "보완 대체 의사소통" },
            { eng: "Autism Spectrum Disorder", kor: "자폐 스펙트럼 장애" },
            { eng: "Behavior Intervention Plan", kor: "행동 중재 계획" },
            { eng: "Cognitive Behavioral Intervention", kor: "인지 행동 중재" },
            { eng: "Cognitive Distortions", kor: "인지적 왜곡" },
            { eng: "Cognitive Restructuring", kor: "인지 재구조화" },
            { eng: "Comic Strip Conversation", kor: "만화 대화" },
            { eng: "Conduct Disorders", kor: "품행 장애" },
            { eng: "Discrete Trial Teaching", kor: "불연속 시행 훈련" },
            { eng: "Emotional and Behavior Disorders", kor: "정서 및 행동 장애" },
            { eng: "Functional Behavior Assessment", kor: "기능적 행동 평가" },
            { eng: "Functional Communication Training", kor: "기능적 의사소통 훈련" },
            { eng: "Internalizing Behavior", kor: "내면화 문제" },
            { eng: "Obsessive Compulsive Disorders", kor: "강박 장애" },
            { eng: "Oppositional Defiant Disorder", kor: "적대적 반항 장애" },
            { eng: "Parent-Implemented Intervention", kor: "부모 실시 중재" },
            { eng: "Peer-Mediated Instruction", kor: "또래 매개 교수" },
            { eng: "Picture Exchange Communication", kor: "그림 교환 의사소통 체계" },
            { eng: "Positive Behavior Supports", kor: "긍정적 행동 지원" },
            { eng: "Post Traumatic Stress Disorders", kor: "외상 후 스트레스 장애" },
            { eng: "Prompting", kor: "촉진" },
            { eng: "Rational Emotive Behavior Therapy", kor: "합리적 정서 행동 치료" },
            { eng: "Reinforcement", kor: "강화" },
            { eng: "Resilience", kor: "회복탄력성" },
            { eng: "School Refusal", kor: "등교 거부" },
            { eng: "Selective Mutism", kor: "선택적 함구증" },
            { eng: "Self-Identity", kor: "자아 정체성" },
            { eng: "Sensory Sensitivity", kor: "감각 민감성" },
            { eng: "Social Maladjustment", kor: "사회적 부적응" },
            { eng: "Social Skills Training", kor: "사회적 기술 훈련" },
            { eng: "Strengths-Based Assessment", kor: "강점 중심 평가" },
            { eng: "Task Analysis", kor: "과제 분석" },
            { eng: "Visual Support", kor: "시각적 지원" }
        ];

        let currentMode = ''; 
        let studyQueue = [];
        let completedCount = 0;
        let totalInitial = 35;

        function speak(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.85;
            window.speechSynthesis.speak(utterance);
        }

        function speakCurrentWord() {
            if (currentMode === 'kor') speak(studyQueue[0].eng);
        }

        function speakFeedbackWord() {
            speak(studyQueue[0].eng);
        }

        function showScreen(screenId) {
            ['home-screen', 'study-screen', 'complete-screen'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            document.getElementById(screenId).classList.remove('hidden');
        }

        function startStudy(mode) {
            currentMode = mode;
            studyQueue = [...wordData].sort(() => Math.random() - 0.5);
            completedCount = 0;
            totalInitial = studyQueue.length;
            
            document.getElementById('question-label').innerText = 
                mode === 'kor' ? "WRITE KOREAN MEANING" : "WRITE ENGLISH WORD";
            
            if(mode === 'kor') {
                document.getElementById('speaker-icon').classList.remove('hidden');
            } else {
                document.getElementById('speaker-icon').classList.add('hidden');
            }

            updateProgress();
            renderQuestion();
            showScreen('study-screen');
        }

        function goHome() {
            showScreen('home-screen');
            resetUI();
        }

        function updateProgress() {
            const progress = (completedCount / totalInitial) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
        }

        function renderQuestion() {
            if (studyQueue.length === 0) {
                showScreen('complete-screen');
                return;
            }
            const currentItem = studyQueue[0];
            document.getElementById('question-text').innerText = 
                currentMode === 'kor' ? currentItem.eng : currentItem.kor;
            
            document.getElementById('answer-input').value = '';
            document.getElementById('feedback-area').classList.add('hidden');
            document.getElementById('answer-input').disabled = false;
            document.getElementById('submit-btn').disabled = false;
            document.getElementById('idk-btn').disabled = false;
            
            // 모바일 키보드 자동 활성화 시도
            setTimeout(() => document.getElementById('answer-input').focus(), 100);
        }

        function normalize(str) {
            return str.replace(/\s+/g, '').toLowerCase();
        }

        function checkAnswer() {
            const userInput = document.getElementById('answer-input').value.trim();
            if (!userInput) return;

            const currentItem = studyQueue[0];
            const targetAnswer = currentMode === 'kor' ? currentItem.kor : currentItem.eng;
            
            const isCorrect = normalize(userInput) === normalize(targetAnswer);
            showFeedback(isCorrect, targetAnswer);
        }

        function handleIDontKnow() {
            const targetAnswer = currentMode === 'kor' ? studyQueue[0].kor : studyQueue[0].eng;
            showFeedback(false, targetAnswer, true);
        }

        function showFeedback(isCorrect, answer, isIDK = false) {
            const area = document.getElementById('feedback-area');
            const msg = document.getElementById('feedback-msg');
            const detail = document.getElementById('correct-answer-display');
            const fbSpeaker = document.getElementById('feedback-speaker');

            area.classList.remove('hidden');
            document.getElementById('answer-input').disabled = true;
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('idk-btn').disabled = true;

            if(currentMode === 'eng') fbSpeaker.classList.remove('hidden');
            else fbSpeaker.classList.add('hidden');

            if (isCorrect) {
                area.className = "mt-8 p-6 rounded-[2rem] bg-emerald-500 text-white shadow-xl shadow-emerald-100 animate-bounce-short";
                msg.innerText = "정답입니다! ✨";
                detail.innerText = "";
                completedCount++;
                studyQueue.shift();
                
                setTimeout(() => {
                    updateProgress();
                    renderQuestion();
                }, 1200);

            } else {
                area.className = "mt-8 p-6 rounded-[2rem] bg-rose-500 text-white shadow-xl shadow-rose-100";
                msg.innerText = isIDK ? "정답을 확인하세요" : "조금 더 힘내세요!";
                detail.innerText = `정답: ${answer}`;
                
                const item = studyQueue.shift();
                studyQueue.push(item);

                document.getElementById('next-btn').onclick = () => {
                    updateProgress();
                    renderQuestion();
                };
            }
        }

        function resetUI() {
            document.getElementById('answer-input').value = '';
            document.getElementById('feedback-area').classList.add('hidden');
            document.getElementById('progress-bar').style.width = '0%';
        }

        document.getElementById('answer-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const area = document.getElementById('feedback-area');
                if (!area.classList.contains('hidden')) {
                    const msg = document.getElementById('feedback-msg').innerText;
                    if (msg.includes("확인") || msg.includes("힘내세요")) {
                        document.getElementById('next-btn').click();
                    }
                } else {
                    checkAnswer();
                }
            }
        });
    </script>
</body>
</html>
